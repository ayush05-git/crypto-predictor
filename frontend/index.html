<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
  <title>Crypto Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060810;
      font-family: 'Space Mono', monospace;
      color: #e8eaf6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .glow-orb {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,157,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      top: -200px; left: 50%; transform: translateX(-50%);
    }

    .container {
      position: relative; z-index: 2;
      max-width: 640px; margin: 0 auto;
      padding: 60px 24px 80px;
      display: flex; flex-direction: column; align-items: center; gap: 40px;
    }

    .eyebrow {
      font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
      color: #00ff9d; opacity: 0.7; margin-bottom: 12px; text-align: center;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 8vw, 60px);
      font-weight: 800; line-height: 1; color: #fff;
      text-shadow: 0 0 40px rgba(0,255,157,0.3);
      letter-spacing: -0.02em; text-align: center;
    }

    .title span { color: #00ff9d; }

    .subtitle {
      margin-top: 14px; text-align: center;
      font-size: 12px; opacity: 0.4; letter-spacing: 0.05em; line-height: 1.6;
    }

    .card {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,255,157,0.12);
      border-radius: 2px; padding: 28px;
      position: relative; overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,157,0.5), transparent);
    }

    .predict-btn {
      width: 100%; padding: 16px;
      background: transparent;
      border: 1px solid #00ff9d;
      color: #00ff9d;
      font-family: 'Space Mono', monospace;
      font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; border-radius: 2px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .predict-btn:hover {
      background: rgba(0,255,157,0.08);
      box-shadow: 0 0 30px rgba(0,255,157,0.2);
    }

    .predict-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .loader { display: flex; align-items: center; justify-content: center; gap: 8px; }

    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #00ff9d;
      animation: pulse 1.2s ease-in-out infinite;
      display: inline-block;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .error-box {
      width: 100%;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: 2px; padding: 16px;
      font-size: 12px; color: #ff4d6d; line-height: 1.6;
      display: none;
    }

    .results-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 20px;
    }

    .results-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;
      color: #00ff9d; opacity: 0.6;
    }

    .trend-badge {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px;
    }

    .bullish { background: rgba(0,255,157,0.1); border: 1px solid rgba(0,255,157,0.3); color: #00ff9d; }
    .bearish { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: #ff4d6d; }

    .price-rows { display: flex; flex-direction: column; gap: 2px; }

    .price-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-radius: 2px;
      background: rgba(255,255,255,0.02);
      border-left: 2px solid transparent;
      font-size: 13px;
      opacity: 0; transform: translateX(-8px);
      transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.2s;
    }

    .price-row.visible { opacity: 1; transform: translateX(0); }
    .price-row:hover { background: rgba(0,255,157,0.04); border-left-color: rgba(0,255,157,0.4); }

    .day-label { opacity: 0.45; font-size: 11px; }
    .day-index { font-size: 10px; opacity: 0.25; margin-left: 6px; }
    .up { color: #00ff9d; }
    .down { color: #ff4d6d; }

    .chart-wrap { margin-top: 28px; display: flex; justify-content: center; }

    .results-card { display: none; }

    .footer-note {
      font-size: 10px; opacity: 0.25; text-align: center;
      line-height: 1.8; max-width: 400px;
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="glow-orb"></div>

  <div class="container">
    <header>
      <p class="eyebrow">LSTM Neural Network</p>
      <h1 class="title">BTC<span>/USD</span></h1>
      <p class="subtitle">
        7-day price forecast · trained on 60 days of CoinGecko data<br/>
        Model refreshes on each prediction run
      </p>
    </header>

    <div class="card">
      <button class="predict-btn" id="btn" onclick="loadPrediction()">→ Run Prediction</button>
    </div>

    <div class="error-box" id="error"></div>

    <div class="card results-card" id="results">
      <div class="results-header">
        <span class="results-label">7-Day Forecast</span>
        <span class="trend-badge" id="trend"></span>
      </div>
      <div class="price-rows" id="rows"></div>
      <div class="chart-wrap">
        <svg id="chart" width="320" height="80" viewBox="0 0 320 80" overflow="visible"></svg>
      </div>
    </div>

    <p class="footer-note">
      Predictions generated by LSTM model running locally.<br/>
      Requires FastAPI server at localhost:8000 · Not financial advice.
    </p>
  </div>

  <script>
    const formatUSD = (n) =>
      new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);

    const getDayLabel = (offset) => {
      const d = new Date();
      d.setDate(d.getDate() + offset + 1);
      return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    };

    function drawChart(data) {
      const svg = document.getElementById("chart");
      svg.innerHTML = "";
      const W = 320, H = 80, PAD = 8;
      const min = Math.min(...data), max = Math.max(...data);
      const range = max - min || 1;
      const pts = data.map((v, i) => {
        const x = PAD + (i / (data.length - 1)) * (W - PAD * 2);
        const y = H - PAD - ((v - min) / range) * (H - PAD * 2);
        return [x, y];
      });

      const ns = "http://www.w3.org/2000/svg";

      const defs = document.createElementNS(ns, "defs");
      defs.innerHTML = `
        <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00ff9d" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#00ff9d" stop-opacity="0"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>`;
      svg.appendChild(defs);

      const ptStr = pts.map(p => p.join(",")).join(" ");
      const area = document.createElementNS(ns, "polygon");
      area.setAttribute("points", `${ptStr} ${pts[pts.length-1][0]},${H-PAD} ${PAD},${H-PAD}`);
      area.setAttribute("fill", "url(#fg)");
      svg.appendChild(area);

      const line = document.createElementNS(ns, "polyline");
      line.setAttribute("points", ptStr);
      line.setAttribute("fill", "none");
      line.setAttribute("stroke", "#00ff9d");
      line.setAttribute("stroke-width", "2");
      line.setAttribute("filter", "url(#glow)");
      line.setAttribute("stroke-linejoin", "round");
      svg.appendChild(line);

      pts.forEach(([x, y]) => {
        const c = document.createElementNS(ns, "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y);
        c.setAttribute("r", "3"); c.setAttribute("fill", "#00ff9d");
        c.setAttribute("filter", "url(#glow)");
        svg.appendChild(c);
      });
    }

    async function loadPrediction() {
      const btn = document.getElementById("btn");
      const errorBox = document.getElementById("error");
      const resultsCard = document.getElementById("results");

      btn.disabled = true;
      btn.innerHTML = `<span class="loader"><span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp; Training model...</span>`;
      errorBox.style.display = "none";
      resultsCard.style.display = "none";

      try {
        const res = await fetch("http://127.0.0.1:8000/predict");
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        const predictions = data.prediction;

        const trend = predictions[predictions.length - 1] > predictions[0] ? "bullish" : "bearish";
        const trendEl = document.getElementById("trend");
        trendEl.textContent = trend;
        trendEl.className = `trend-badge ${trend}`;

        const rows = document.getElementById("rows");
        rows.innerHTML = "";
        predictions.forEach((p, i) => {
          const prev = i === 0 ? null : predictions[i - 1];
          const up = prev === null || p >= prev;
          const row = document.createElement("div");
          row.className = "price-row";
          row.innerHTML = `
            <span>
              <span class="day-label">${getDayLabel(i)}</span>
              <span class="day-index">D+${i + 1}</span>
            </span>
            <span class="${up ? 'up' : 'down'}">${up ? "▲" : "▼"} ${formatUSD(p)}</span>`;
          rows.appendChild(row);
          setTimeout(() => row.classList.add("visible"), i * 120);
        });

        drawChart(predictions);
        resultsCard.style.display = "block";

      } catch (e) {
        errorBox.textContent = "⚠ " + (e.message.includes("fetch")
          ? "Cannot reach server. Is FastAPI running? Run: uvicorn server:app --reload in the backend folder."
          : e.message);
        errorBox.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "→ Run Prediction";
      }
    }
  </script>

</body>
</html>
